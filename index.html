<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>

    <!-- Optional: A simple favicon for browser tab -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👋</text></svg>">

    <style>
        /*
         * CSS Styling Section
         * Defines the visual presentation of the web application.
         * Uses a clean, modern aesthetic with a pleasant color palette.
         */

        /* Global Reset & Body Styling */
        body {
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh; /* Make body take full viewport height */
            display: flex;
            flex-direction: column; /* Stack children vertically */
            justify-content: center; /* Center content vertically */
            align-items: center; /* Center content horizontally */
            background-color: #f0f4f8; /* Pleasant light background blue-gray */
            color: #333; /* Darker text for contrast */
            line-height: 1.6;
            overflow: hidden; /* Prevent scrollbars if content slightly overflows during animation */
        }

        /* Container for better organization and visual grouping */
        .container {
            text-align: center; /* Center text within the container */
            padding: 2.5em 3.5em; /* Ample padding */
            background-color: #ffffff; /* White background for the content area */
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1); /* Soft, prominent shadow */
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out; /* Smooth hover effect */
        }

        .container:hover {
            transform: translateY(-5px); /* Lift effect on hover */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* Slightly larger shadow on hover */
        }

        /* Heading Styling */
        h1 {
            font-size: 3.8em; /* Large, prominent text */
            color: #2c3e50; /* A dark blue-gray for the heading */
            margin-bottom: 0.8em; /* Space below the heading */
            /* Smooth transitions for opacity, transform, and color changes */
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        /* Button Styling */
        button {
            padding: 0.9em 2em; /* Generous padding for a comfortable click area */
            font-size: 1.3em;
            font-weight: 600; /* Make font slightly bolder */
            border: none;
            border-radius: 8px; /* Slightly rounded corners */
            background-color: #3498db; /* A vibrant blue for the button */
            color: #ffffff; /* White text on button */
            cursor: pointer;
            outline: none; /* Remove outline on focus for a cleaner look */
            /* Smooth transitions for hover/active states */
            transition: background-color 0.3s ease-in-out, transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            margin-top: 1.8em; /* Space above the button */
            letter-spacing: 0.5px; /* Slight letter spacing for readability */
        }

        button:hover {
            background-color: #2980b9; /* Darker blue on hover */
            transform: translateY(-3px); /* Lift effect on hover */
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25); /* Enhanced shadow on hover */
        }

        button:active {
            background-color: #21618c; /* Even darker blue on click */
            transform: translateY(0); /* Return to original position */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Smaller shadow on active */
        }
    </style>
</head>
<body>
    <!--
     * HTML Structure Section
     * Defines the content and layout of the web page.
     * Contains a main heading and a button.
     -->
    <div class="container">
        <!-- The main heading element that will display the greeting message -->
        <h1 id="greetingText">Hello, World!</h1>

        <!-- The button element that users will click to change the text -->
        <button id="changeTextButton">Click Me</button>
    </div>

    <script>
        /*
         * JavaScript Logic Section
         * Handles the interactivity of the web page.
         * Changes the greeting text when the button is clicked with a smooth transition.
         */

        // 1. Get references to the necessary HTML elements using their IDs
        const greetingTextElement = document.getElementById('greetingText');
        const changeTextButton = document.getElementById('changeTextButton');

        // 2. Add an event listener to the button for the 'click' event
        changeTextButton.addEventListener('click', () => {
            // Optional Enhancement: Implement a smooth transition for text change.
            // This involves fading out the current text, changing it, and then fading it back in.

            // Start the fade-out and scale-down animation for the current text
            greetingTextElement.style.opacity = '0';
            greetingTextElement.style.transform = 'scale(0.9)'; // Subtle scale-down effect

            // Use setTimeout to wait for the fade-out transition to complete (300ms)
            // before changing the text and starting the fade-in.
            setTimeout(() => {
                // Change the text content to the new greeting
                greetingTextElement.textContent = 'Hello, Azeem!';
                
                // Change the text color for the new greeting to add visual distinction
                greetingTextElement.style.color = '#e74c3c'; // A pleasant red-orange for "Hello, Azeem!"

                // Start the fade-in and scale-up animation for the new text
                greetingTextElement.style.opacity = '1';
                greetingTextElement.style.transform = 'scale(1)'; // Return to original scale
            }, 300); // This duration (300ms) must match the CSS transition duration for 'opacity' and 'transform'.
        });

        // Initial setup (optional, but good for clarity):
        // Ensure the initial color of the greeting text matches the CSS definition.
        // This line is technically redundant if CSS is well-defined but doesn't hurt.
        greetingTextElement.style.color = '#2c3e50'; 
    </script>
</body>
</html>
